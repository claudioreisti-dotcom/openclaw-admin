name: CI

on:
  push:
    branches: [main]
    paths:
      - "openclaw-admin/**"
  pull_request:
    branches: [main]
    paths:
      - "openclaw-admin/**"

defaults:
  run:
    working-directory: openclaw-admin

jobs:
  ci:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: openclaw-admin/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test --run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: https://alfred.vercel.app
          NEXT_PUBLIC_APP_URL: https://alfred.vercel.app
          NEXT_PUBLIC_APP_NAME: Alfred Admin
