services:
  eli-metabase:
    image: metabase/metabase:latest
    container_name: eli-metabase
    ports:
      - "3001:3000"
    volumes:
      - eli-metabase-data:/metabase-data
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    restart: unless-stopped

volumes:
  eli-metabase-data:
